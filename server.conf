http
{
    server
    {
        listen 8080;
        server_name site1.localhost;

        root ./www/site1;
        index index.html index.htm index.py;

        # max_body_size 5;

        # Pages d'erreur spécifiques à ce server
        error_page 414 /error_page/error414.html;
        error_page 404 /error_page/error404.html;
        error_page 403 /error_page/error403.html;
        error_page 400 /error_page/error400.html;
        error_page 501 /error_page/error501.html;

        # -----------------------------------------------------
        # Route racine : site statique principal
        # -----------------------------------------------------
        location / {
            root ./www/site1;
            index index.html index.htm;
            limit_except POST DELETE PUT;
            autoindex off;
        }

        # -----------------------------------------------------
        # Upload de fichiers
        # Exemple : POST vers /downloads
        # -----------------------------------------------------
        location /downloads/ {
            root ./www/site1;
            autoindex on;
        }

        # -----------------------------------------------------
        # CGI Perl
        # -----------------------------------------------------
        location /perl/ {
            root ./www/site1/cgi;
            cgi_extension .pl;
            cgi_path /usr/bin/perl;
            autoindex off;
            cgi on;
        }

        # -----------------------------------------------------
        # CGI python
        # Si ton projet ne gère pas PHP CGI, retire ce bloc
        # -----------------------------------------------------
        location /python/ {
            root ./www/site1/cgi;
            cgi_extension .py;
            # cgi_path /opt/homebrew/bin/python3;
			cgi_path /usr/bin/python3;

            autoindex off;
            cgi on;
        }

        location /bash/ {
            root ./www/site1/cgi;
            cgi_extension .sh;
            cgi_path /bin/bash;

            autoindex off;
            cgi on;
        }

        # -----------------------------------------------------
        # Route de test d'erreurs / fallback
        # -----------------------------------------------------
        location /error_page/ {
            root ./www/site1;
            limit_except POST DELETE PUT;
            autoindex on;
        }

        location /styles/ {
            root ./www/site1;
            limit_except POST DELETE PUT;
            autoindex on;
        }
    }

    server
    {
        listen 8080;
        server_name site2.localhost;

        root ./www/site2;
        index index.html index.htm index.py;

        # max_body_size 5;

        # -----------------------------------------------------
        # Route racine : site statique principal
        # -----------------------------------------------------
        location / {
            root ./www/site2;
            index index.html index.htm;
            limit_except POST DELETE PUT;
            autoindex off;
        }

        location /downloads/ {
            root ./www/site2;
            autoindex on;
        }

        location /styles/ {
            root ./www/site2;
            limit_except POST DELETE PUT;
            autoindex on;
        }
    }

    server
    {
        listen 8081;
        server_name site3.localhost;

        root ./www/site3;
        index index.html index.htm index.py;

        # max_body_size 5;

        # -----------------------------------------------------
        # Route racine : site statique principal
        # -----------------------------------------------------
        location / {
            root ./www/site3;
            index index.html index.htm;
            limit_except POST DELETE PUT;
            autoindex off;
        }

        location /downloads/ {
            root ./www/site3;
            autoindex on;
        }

        location /styles/ {
            root ./www/site3;
            limit_except POST DELETE PUT;
            autoindex on;
        }
    }

	# http_max_method_siz			1;
	# http_max_uri_siz			2;
